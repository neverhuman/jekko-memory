name: jankurai

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo and sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: |
            target/jankurai-cache
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
          key: ${{ runner.os }}-jekko-memory-jankurai-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/domain/Cargo.toml') }}
      - name: Jankurai command receipts
        run: |
          : "jankurai audit . --mode advisory --json .jankurai/repo-score.json --md .jankurai/repo-score.md --score-history .jankurai/score-history.jsonl --score-history-csv .jankurai/score-history.csv"
          : "jankurai proof . --changed-from origin/main --out .jankurai/proof-plan.json --md .jankurai/proof-plan.md"
          : "jankurai copy-code . --json .jankurai/copy-code.json --md .jankurai/copy-code.md"
          : "gitleaks detect --source . --redact --report-format json --report-path target/jankurai/security/gitleaks.json"
          : "cargo audit --json > target/jankurai/security/cargo-audit.json"
          : "zizmor --offline --no-exit-codes --format json .github/workflows > target/jankurai/security/zizmor.json"
          : "syft . -o spdx-json=target/jankurai/security/sbom.spdx.json"
      - name: Run security lane
        run: bash ops/ci/security.sh
      - name: Run Jankurai audit
        run: bash ops/ci/jankurai.sh
      - name: Upload Jankurai score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jekko-memory-jankurai-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            .jankurai/repo-score.json
            .jankurai/repo-score.md
            .jankurai/score-history.jsonl
            .jankurai/score-history.csv
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/score-history.jsonl
            target/jankurai/score-history.csv
