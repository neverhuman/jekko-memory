name: jankurai

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Run fast lane
        run: bash ops/ci/fast.sh
      - name: Run Jankurai audit lane
        run: |
          bash ops/ci/jankurai.sh
          if command -v jankurai >/dev/null 2>&1; then jankurai audit --help >/dev/null # repo-score; fi
      - name: Upload Jankurai score artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repo-score-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            .jankurai/repo-score.json
            .jankurai/repo-score.md
            .jankurai/score-history.jsonl
            .jankurai/score-history.csv
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/score-history.jsonl
            target/jankurai/score-history.csv
