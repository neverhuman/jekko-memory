[db]
constraint_paths = ["db/constraints"]
migration_paths = ["db/migrations"]
root_paths = ["db"]

[python]
allowed_truth_paths = ["python/ai-service"]

[rust]
domain_paths = [
    "src",
    "crates/domain",
    "crates/*/src/domain",
]
forbidden_domain_imports = [
    "std::fs",
    "std::env",
    "std::net",
    "std::time::SystemTime",
    "rand::",
    "sqlx::",
    "diesel::",
    "reqwest::",
    "rdkafka::",
    "tracing::",
    "log::",
]

[stack]
id = "rust-split-family-child"
version = "1.0.0"
